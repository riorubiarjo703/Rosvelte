# Nginx reverse proxy for local SvelteKit dev (Vite on the host).
# Install: symlink or copy into Docker nginx sites-enabled, then reload nginx.
#
# Prereqs:
#   /etc/hosts → 127.0.0.1 rosvelte.test
#   Host: npm run dev:host   (sets VITE_DEV_HOST=rosvelte.test for HMR via port 80)
#   Vite binds 0.0.0.0:5173; nginx uses host.docker.internal:5173 (Docker Desktop Mac).

server {
	listen 80;
	listen [::]:80;

	server_name rosvelte.test;

	location / {
		proxy_pass http://host.docker.internal:5173;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Port $server_port;
		proxy_redirect off;
		proxy_cache_bypass $http_upgrade;
		proxy_buffering off;
	}
}
